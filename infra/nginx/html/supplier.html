```html
<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>پنل پیمانکار</title>

<style>

body{
    font-family:sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}

.login{
    max-width:360px;
    margin:60px auto;
    background:#fff;
    padding:24px;
    border-radius:16px;
    box-shadow:0 2px 14px rgba(0,0,0,.08);
}

.panel{
    max-width:1200px;
    margin:auto;
}

.header{
    background:#fff;
    border-radius:16px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:20px;
}

.stats{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.stat{
    background:#eef2ff;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

.card{
    background:#fff;
    border-radius:16px;
    padding:18px;
    border:1px solid #e5e7eb;
}

.hot{
    border:2px solid #dc2626;
}

.expiring{
    border:2px solid #f59e0b;
}

button{
    width:100%;
    border:none;
    background:#2563eb;
    color:#fff;
    padding:12px;
    border-radius:10px;
    margin-top:14px;
    cursor:pointer;
    font-size:14px;
}

button:disabled{
    background:#999;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-top:12px;
    box-sizing:border-box;
}

.row{
    margin-top:10px;
    color:#444;
}

.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    margin-top:10px;
}

.pending{
    background:#fef3c7;
}

.won{
    background:#dcfce7;
}

.lost{
    background:#fee2e2;
}

.expired{
    background:#e5e7eb;
}

.processing{
    background:#dbeafe;
}

.section{
    margin-top:28px;
    margin-bottom:12px;
}

.empty{
    background:#fff;
    border-radius:12px;
    padding:20px;
    color:#666;
}

.toast{
    position:fixed;
    bottom:20px;
    left:20px;
    background:#111;

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginBox" class="login">

    <h2>ورود پیمانکار</h2>

    <input id="phone" placeholder="شماره موبایل">

    <input id="password" type="password" placeholder="رمز عبور">

    <button onclick="login()">
        ورود
    </button>

</div>

<!-- PANEL -->

<div id="panel" class="panel" style="display:none;">

    <div class="header">

        <div>

            <div style="font-size:20px;font-weight:bold" id="supplierName">
                -
            </div>

            <div id="supplierMeta" style="margin-top:8px;color:#666">
                -
            </div>

        </div>

        <div class="stats">

            <div class="stat">
                💳 اعتبار:
                <span id="credit">0</span>
            </div>

            <div class="stat">
                💰 کیف پول:
                <span id="wallet">0</span>
            </div>

        </div>

    </div>

    <h3 class="section">
        🔥 لیدهای فعال
    </h3>

    <div id="leads" class="grid"></div>

    <h3 class="section">
        📊 تاریخچه
    </h3>

    <div id="history" class="grid"></div>

</div>

<div id="toast" class="toast"></div>

<script>

const API = "/api/v1"

let token = null
let supplierId = null
let ws = null

const leadsState = {}

const toastEl = document.getElementById("toast")

// --------------------------------------------------
// TOAST
// --------------------------------------------------

function toast(msg){

    toastEl.innerText = msg
    toastEl.style.display = "block"

    setTimeout(()=>{
        toastEl.style.display = "none"
    },3000)
}

// --------------------------------------------------
// LOGIN
// --------------------------------------------------

async function login(){

    const phone =
        document.getElementById("phone").value.trim()

    const password =
        document.getElementById("password").value.trim()

    if(!phone || !password){

        alert("شماره و رمز الزامی است")
        return
    }

    try{

        const r = await fetch(API + "/auth/supplier/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                phone,
                password
            })
        })

        const res = await r.json()

        if(!res.success){

            alert(res.error || "login failed")
            return
        }

        token = res.token

        document.getElementById("loginBox").style.display = "none"
        document.getElementById("panel").style.display = "block"

        await init()

    }catch(e){

        console.error(e)

        alert("خطا در ارتباط")

    }
}

// --------------------------------------------------
// INIT
// --------------------------------------------------

async function init(){

    await loadMe()

    connectWS()

    await loadLeads()

    await loadHistory()
}

// --------------------------------------------------
// LOAD ME
// --------------------------------------------------

async function loadMe(){

    const r = await fetch(API + "/supplier/me",{
        headers:{ token }
    })

    const res = await r.json()

    if(!res.success) return

    const s = res.supplier

    supplierId = s.id

    document.getElementById("supplierName").innerText =
        s.full_name || "-"

    document.getElementById("supplierMeta").innerText =
        `⭐ ${s.score || 0} | 🏆 ${s.wins || 0} | 📞 ${s.phone || "-"}`

    document.getElementById("credit").innerText =
        s.credit_balance || 0

    document.getElementById("wallet").innerText =
        s.wallet_balance || 0
}

// --------------------------------------------------
// WS
// --------------------------------------------------

function connectWS(){

    if(!supplierId) return

    const protocol =
        location.protocol === "https:" ? "wss" : "ws"

    ws = new WebSocket(
        `${protocol}://${location.host}/ws/${supplierId}`
    )

    ws.onopen = ()=>{

        console.log("WS connected")
    }

    ws.onmessage = async(event)=>{

        const data = JSON.parse(event.data)

        console.log(data)

        if(
            data.type === "new_lead" ||
            data.type === "new_match"
        ){

            toast("📥 لید جدید")

            leadsState[data.match_id] =
                normalizeLead(data)

            renderLeads()
        }

        if(data.type === "claim_result"){

            if(leadsState[data.match_id]){

                leadsState[data.match_id].status =
                    data.status
            }

            renderLeads()

            loadMe()

            loadHistory()

            toast(
                data.status === "won"
                ? "🎉 برنده شدید"
                : "❌ از دست رفت"
            )
        }
    }

    ws.onclose = ()=>{

        setTimeout(connectWS,3000)
    }

    ws.onerror = ()=>{

        ws.close()
    }
}

// --------------------------------------------------
// NORMALIZE
// --------------------------------------------------

function normalizeLead(l){

    return {

        match_id: l.match_id,

        lead_id: l.lead_id,

        category:
            l.category_name ||
            "-",

        subcategory:
            l.subcategory_name ||
            "-",

        location:
            l.location_name ||
            "-",

        problem:
            l.problem || "-",

        score:
            Number(l.score || 0),

        status:
            l.status || "pending",

        expires_at:
            l.expires_at
            ? new Date(l.expires_at)
            : new Date(Date.now() + 300000)
    }
}

// --------------------------------------------------
// LOAD LEADS
// --------------------------------------------------

async function loadLeads(){

    const r = await fetch(API + "/supplier/leads",{
        headers:{ token }
    })

    const res = await r.json()

    if(!res.success) return

    Object.keys(leadsState).forEach(k=>{
        delete leadsState[k]
    })

    res.leads.forEach(l=>{

        leadsState[l.match_id] =
            normalizeLead(l)
    })

    renderLeads()
}

// --------------------------------------------------
// RENDER LEADS
// --------------------------------------------------

function renderLeads(){

    const el = document.getElementById("leads")

    const items =
        Object.values(leadsState)
        .filter(x=>x.status !== "expired")
        .sort((a,b)=>b.score-a.score)

    if(!items.length){

        el.innerHTML = `
            <div class="empty">
                لید فعالی وجود ندارد
            </div>
        `
        return
    }

    let html = ""

    items.forEach(l=>{

        const remaining =
            Math.max(
                0,
                Math.floor(
                    (l.expires_at - new Date()) / 1000
                )
            )

        let cls = "card"

        if(remaining < 20){
            cls += " hot"
        }
        else if(remaining < 45){
            cls += " expiring"
        }

        html += `
        <div class="${cls}">

            <b>${l.category}</b>

            <div class="row">
                🔧 ${l.subcategory}
            </div>

            <div class="row">
                📍 ${l.location}
            </div>

            <div class="row">
                📝 ${l.problem}
            </div>

            <div class="row">
                ⭐ امتیاز:
                ${l.score.toFixed(1)}
            </div>

            <div class="row">
                ⏳ ${remaining} ثانیه
            </div>

            <div class="badge ${l.status}">
                ${translateStatus(l.status)}
            </div>

            <button
                onclick="claim('${l.match_id}')"
                ${l.status !== "pending" ? "disabled" : ""}
            >
                دریافت لید
            </button>

        </div>
        `
    })

    el.innerHTML = html
}

// --------------------------------------------------
// CLAIM
// --------------------------------------------------

async function claim(matchId){

    if(!leadsState[matchId]) return

    const l = leadsState[matchId]

    if(l.status !== "pending") return

    l.status = "processing"

    renderLeads()

    try{

        const r = await fetch(API + "/supplier/claim",{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                token
            },

            body:JSON.stringify({
                match_id: matchId
            })
        })

        const res = await r.json()

        if(!res.success){

            l.status = "pending"

            toast(res.error || "claim failed")

            renderLeads()

            return
        }

        l.status = res.result.status

        renderLeads()

        loadMe()

        loadHistory()

    }catch(e){

        console.error(e)

        l.status = "pending"

        renderLeads()
    }
}

// --------------------------------------------------
// HISTORY
// --------------------------------------------------

async function loadHistory(){

    const r = await fetch(API + "/supplier/history",{
        headers:{ token }
    })

    const res = await r.json()

    if(!res.success) return

    const el = document.getElementById("history")

    if(!res.history.length){

        el.innerHTML = `
            <div class="empty">
                سابقه‌ای وجود ندارد
            </div>
        `
        return
    }

    let html = ""

    res.history.forEach(h=>{

        html += `
        <div class="card">

            <b>
                ${h.category_name || "-"}
            </b>

            <div class="row">
                📝 ${h.problem || "-"}
            </div>

            <div class="row">
                📍 ${h.location_name || "-"}
            </div>

            <div class="row">
                وضعیت:
                ${translateStatus(h.status)}
            </div>

            ${
                h.phone
                ? `<div class="row">📞 ${h.phone}</div>`
                : ""
            }

        </div>
        `
    })

    el.innerHTML = html
}

// --------------------------------------------------
// STATUS
// --------------------------------------------------

function translateStatus(status){

    if(status === "pending") return "در انتظار"
    if(status === "processing") return "در حال بررسی"
    if(status === "won") return "برنده"
    if(status === "lost") return "باخت"
    if(status === "expired") return "منقضی"

    return status
}

// --------------------------------------------------
// INTERVALS
// --------------------------------------------------

setInterval(()=>{

    renderLeads()

},1000)

setInterval(()=>{

    if(token){

        loadLeads()
    }

},7000)

</script>

</body>
</html>
