server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

   # ---------------------------
    # API (VERY IMPORTANT - FIRST)
    # ---------------------------

    location /api/ {
        proxy_pass http://lae_backend:8000/api/;
    }

   # ---------- WEBSOCKET ----------
    location /ws/ {
        proxy_pass http://lae_backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
    }
    # ---------------------------
    # STATIC FILES (Frontend)
    # ---------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /supplier.html {
        root /usr/share/nginx/html;
    }

    # ---------------------------
    # API ROUTES
    # ---------------------------

    # USER FLOW
location /request {
    proxy_pass http://lae_backend:8000/api/v1/request;
    }

location /lead {
    proxy_pass http://lae_backend:8000/api/v1/lead;
    }

location /output {
    proxy_pass http://lae_backend:8000/api/v1/output;
    }

location /decision {
    proxy_pass http://lae_backend:8000/api/v1/decision;
    }

    # SUPPLIER FLOW
location /supplier/ {
    proxy_pass http://lae_backend:8000/api/v1/supplier/;
    }

    # ADS
location /ads {
    proxy_pass http://lae_backend:8000/api/v1/ads;
    }

    # BILLING
location /billing/ {
    proxy_pass http://lae_backend:8000/api/v1/billing/;
    }

    # ---------------------------
    # HEADERS
    # ---------------------------
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}